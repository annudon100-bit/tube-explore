<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tube Explore</title>

  <style>
    :root {
      --bg: #050713;
      --panel: rgba(12, 17, 42, 0.62);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8f7ff;
      --muted: #a6accd;
      --purple: #7c3cff;
      --purple-dark: #4d22c9;
      --purple-light: #a785ff;
      --green: #15d38b;
      --shadow: 0 18px 60px rgba(20, 10, 80, 0.34);
      --sidebar-width: 76px;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--text);
      background:
        radial-gradient(circle at 70% 72%, rgba(91, 70, 255, 0.28), transparent 34%),
        radial-gradient(circle at 10% 10%, rgba(207, 61, 255, 0.22), transparent 28%),
        radial-gradient(circle at 52% 4%, rgba(32, 155, 255, 0.12), transparent 24%),
        linear-gradient(135deg, #040511 0%, #07091b 48%, #100725 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 760px;
      height: 760px;
      left: -320px;
      top: -400px;
      opacity: 0.55;
      border: 1px solid rgba(207, 97, 255, 0.26);
      box-shadow:
        0 0 80px rgba(159, 64, 255, 0.34),
        inset 0 0 80px rgba(159, 64, 255, 0.08);
    }

    body::after {
      width: 820px;
      height: 820px;
      right: -390px;
      bottom: -440px;
      opacity: 0.65;
      border: 1px solid rgba(92, 92, 255, 0.28);
      box-shadow:
        0 0 110px rgba(80, 64, 255, 0.42),
        inset 0 0 90px rgba(80, 64, 255, 0.12);
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    svg {
      display: block;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      min-height: 100vh;
      transition: grid-template-columns 260ms ease;
    }

    .app.sidebar-open {
      --sidebar-width: 220px;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 20px 10px;
      background: rgba(7, 11, 30, 0.56);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(22px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      z-index: 5;
    }

    .collapse-btn {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 15px;
      color: white;
      cursor: pointer;
      background: linear-gradient(180deg, #8a5cff, #5c2df0);
      box-shadow:
        0 10px 20px rgba(94, 54, 255, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -6px 12px rgba(38, 12, 145, 0.42);
      font-size: 22px;
      font-weight: 800;
    }

    .brand-mini {
      display: none;
      align-items: center;
      gap: 10px;
      align-self: stretch;
      padding: 0 6px;
      min-width: 0;
    }

    .app.sidebar-open .brand-mini {
      display: flex;
    }

    .brand-mini span {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .brand-mini strong {
      color: #9e72ff;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 2px;
      width: 100%;
    }

    .nav-item {
      position: relative;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0;
      border: 0;
      border-radius: 16px;
      color: var(--text);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: 180ms ease;
    }

    .app.sidebar-open .nav-item {
      width: 100%;
      justify-content: flex-start;
      padding: 0 13px;
    }

    .nav-item:hover,
    .nav-item.active {
      background: rgba(124, 60, 255, 0.22);
      box-shadow: 0 0 22px rgba(124, 60, 255, 0.2);
      transform: translateY(-1px);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .nav-label {
      display: none;
      font-weight: 650;
      font-size: 14px;
      white-space: nowrap;
    }

    .app.sidebar-open .nav-label {
      display: block;
    }

    .tooltip {
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateY(-50%);
      padding: 8px 11px;
      border-radius: 10px;
      background: rgba(10, 14, 35, 0.94);
      color: white;
      font-size: 13px;
      font-weight: 650;
      opacity: 0;
      pointer-events: none;
      transition: 140ms ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .app.sidebar-open .tooltip {
      display: none;
    }

    .nav-item:hover .tooltip {
      opacity: 1;
      left: 70px;
    }

    .main {
      position: relative;
      min-width: 0;
      padding: 24px 32px;
      overflow: hidden;
    }

    .topbar {
      min-height: 46px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .status-pill {
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(255, 255, 255, 0.065);
      backdrop-filter: blur(18px);
      color: var(--text);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
      cursor: pointer;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 16px rgba(21, 211, 139, 0.78);
      flex: 0 0 auto;
    }

    .hero {
      min-height: calc(100vh - 82px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(42px, 7vh, 84px);
      padding-bottom: 44px;
    }

    .logo-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      text-align: center;
    }

    .logo-mark {
      width: clamp(64px, 6vw, 86px);
      height: clamp(64px, 6vw, 86px);
      filter: drop-shadow(0 16px 36px rgba(139, 72, 255, 0.36));
    }

    .wordmark {
      margin: 6px 0 0;
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .wordmark span {
      background: linear-gradient(180deg, #b98cff, #7b3cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-card {
      width: min(820px, 86vw);
      border-radius: 26px;
      padding: 34px 38px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.035)),
        rgba(10, 14, 38, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .tabs {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      padding: 5px;
      border-radius: 18px;
      background: rgba(5, 8, 25, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      min-width: 150px;
      height: 48px;
      border: 0;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 780;
      transition: 180ms ease;
      white-space: nowrap;
    }

    .tab svg {
      width: 21px;
      height: 21px;
    }

    .tab.active {
      color: white;
      background: rgba(124, 60, 255, 0.2);
      box-shadow:
        inset 0 -3px 0 #7c3cff,
        0 8px 20px rgba(124, 60, 255, 0.16);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 144px;
      gap: 14px;
      align-items: center;
    }

    .input-wrap {
      height: 60px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      background: rgba(4, 8, 25, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow:
        inset 0 0 0 1px rgba(124, 60, 255, 0.06),
        0 12px 30px rgba(0, 0, 0, 0.16);
      min-width: 0;
    }

    .input-wrap svg {
      width: 24px;
      height: 24px;
      color: #c9c6ea;
      flex: 0 0 auto;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: white;
      background: transparent;
      font-size: 16px;
    }

    input::placeholder {
      color: rgba(210, 212, 238, 0.52);
    }

    .primary-btn,
    .download-btn {
      border: 0;
      color: white;
      cursor: pointer;
      font-weight: 850;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, #956aff 0%, #6c35ff 56%, #4f22d8 100%);
      box-shadow:
        0 14px 26px rgba(99, 49, 255, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        inset 0 -8px 14px rgba(39, 8, 143, 0.44);
      transition: 180ms ease;
    }

    .primary-btn:hover,
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 18px 36px rgba(99, 49, 255, 0.44),
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 -8px 14px rgba(39, 8, 143, 0.44);
    }

    .primary-btn {
      width: 144px;
      height: 60px;
      border-radius: 18px;
      font-size: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--muted);
      margin: 32px auto 22px;
      width: min(380px, 78%);
      font-weight: 700;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.16), transparent);
    }

    .download-btn {
      height: 56px;
      min-width: 300px;
      border-radius: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto;
      padding: 0 24px;
      font-size: 17px;
    }

    .download-btn svg {
      width: 23px;
      height: 23px;
    }

    @media (max-width: 1180px) {
      .main {
        padding: 22px 26px;
      }

      .search-card {
        width: min(780px, 88vw);
      }
    }

    @media (max-width: 900px) {
      .app,
      .app.sidebar-open {
        --sidebar-width: 72px;
      }

      .sidebar {
        padding: 18px 9px;
      }

      .brand-mini,
      .app.sidebar-open .brand-mini,
      .nav-label {
        display: none;
      }

      .collapse-btn {
        width: 48px;
        height: 48px;
      }

      .nav-item,
      .app.sidebar-open .nav-item {
        width: 52px;
        padding: 0;
        justify-content: center;
      }

      .main {
        padding: 20px 18px;
      }

      .hero {
        min-height: calc(100vh - 76px);
        padding-top: clamp(32px, 6vh, 60px);
      }

      .search-card {
        width: 100%;
        max-width: 720px;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        min-width: 0;
        flex: 1 0 auto;
        padding: 0 12px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow-y: auto;
      }

      body::before {
        width: 560px;
        height: 560px;
        left: -330px;
        top: -260px;
      }

      body::after {
        width: 580px;
        height: 580px;
        right: -350px;
        bottom: -250px;
      }

      .app,
      .app.sidebar-open {
        display: block;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        top: auto;
        height: 68px;
        padding: 8px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        flex-direction: row;
        align-items: center;
        justify-content: center;
        background: rgba(7, 11, 30, 0.82);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      .collapse-btn,
      .brand-mini {
        display: none !important;
      }

      .nav {
        width: 100%;
        margin: 0;
        flex-direction: row;
        gap: 6px;
        justify-content: space-between;
      }

      .nav-item,
      .app.sidebar-open .nav-item {
        width: 44px;
        height: 50px;
        border-radius: 17px;
        background: transparent;
        border-color: transparent;
        padding: 0;
        justify-content: center;
      }

      .nav-item:nth-child(n + 6) {
        display: none;
      }

      .tooltip {
        display: none;
      }

      .main {
        padding: 14px 14px 96px;
        min-height: 100vh;
      }

      .topbar {
        min-height: 42px;
      }

      .status-pill {
        height: 36px;
        padding: 0 13px;
        font-size: 13px;
      }

      .hero {
        min-height: auto;
        justify-content: flex-start;
        padding-top: 28px;
        padding-bottom: 0;
      }

      .logo-lockup {
        margin-bottom: 22px;
      }

      .logo-mark {
        width: 66px;
        height: 66px;
      }

      .wordmark {
        font-size: 36px;
      }

      .search-card {
        width: 100%;
        padding: 20px;
        border-radius: 24px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr;
        gap: 7px;
        width: 100%;
        padding: 7px;
        margin-bottom: 22px;
      }

      .tab {
        width: 100%;
        height: 46px;
        justify-content: flex-start;
        padding: 0 16px;
        font-size: 15px;
      }

      .tab.active {
        box-shadow:
          inset 4px 0 0 #7c3cff,
          0 8px 20px rgba(124, 60, 255, 0.14);
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .input-wrap,
      .primary-btn {
        height: 56px;
      }

      .input-wrap {
        padding: 0 17px;
      }

      input {
        font-size: 15px;
      }

      .primary-btn {
        width: 100%;
        font-size: 17px;
      }

      .divider {
        margin: 26px auto 18px;
        width: 100%;
        gap: 14px;
      }

      .download-btn {
        width: 100%;
        min-width: 0;
        height: 54px;
        font-size: 16px;
      }
    }

    @media (max-width: 420px) {
      .main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .topbar {
        justify-content: center;
      }

      .status-pill {
        width: 100%;
        justify-content: center;
      }

      .wordmark {
        font-size: 32px;
      }

      .search-card {
        padding: 16px;
      }

      .nav-item,
      .app.sidebar-open .nav-item {
        width: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <button class="collapse-btn" id="collapseBtn" aria-label="Toggle sidebar">»</button>

      <div class="brand-mini">
        <svg width="34" height="34" viewBox="0 0 120 120" aria-hidden="true">
          <use href="#logo-symbol"></use>
        </svg>
        <span>Tube <strong>Explore</strong></span>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="nav-item active" title="Search">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-search"/></svg></span>
          <span class="nav-label">Search</span>
          <span class="tooltip">Search</span>
        </button>

        <button class="nav-item" title="Downloads">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-download"/></svg></span>
          <span class="nav-label">Downloads</span>
          <span class="tooltip">Downloads</span>
        </button>

        <button class="nav-item" title="Tasks">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-task"/></svg></span>
          <span class="nav-label">Tasks</span>
          <span class="tooltip">Tasks</span>
        </button>

        <button class="nav-item" title="Files">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-folder"/></svg></span>
          <span class="nav-label">Files</span>
          <span class="tooltip">Files</span>
        </button>

        <button class="nav-item" title="Profiles">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-user"/></svg></span>
          <span class="nav-label">Profiles</span>
          <span class="tooltip">Profiles</span>
        </button>

        <button class="nav-item" title="Presets">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-sliders"/></svg></span>
          <span class="nav-label">Presets</span>
          <span class="tooltip">Presets</span>
        </button>

        <button class="nav-item" title="Outbox">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-box"/></svg></span>
          <span class="nav-label">Outbox</span>
          <span class="tooltip">Outbox</span>
        </button>

        <button class="nav-item" title="Settings">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-gear"/></svg></span>
          <span class="nav-label">Settings</span>
          <span class="tooltip">Settings</span>
        </button>

        <button class="nav-item" title="Health">
          <span class="nav-icon"><svg width="24" height="24"><use href="#i-heart"/></svg></span>
          <span class="nav-label">Health</span>
          <span class="tooltip">Health</span>
        </button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="status-pill" title="Open health details">
          <span class="status-dot"></span>
          Ready
        </button>
      </header>

      <section class="hero">
        <div class="logo-lockup">
          <svg class="logo-mark" viewBox="0 0 120 120" aria-hidden="true">
            <use href="#logo-symbol"></use>
          </svg>
          <h1 class="wordmark">Tube <span>Explore</span></h1>
        </div>

        <section class="search-card" aria-label="Search and download">
          <div class="tabs" role="tablist">
            <button class="tab active" type="button">
              <svg width="21" height="21"><use href="#i-search"/></svg>
              Search
            </button>

            <button class="tab" type="button">
              <svg width="21" height="21"><use href="#i-link"/></svg>
              Video URL
            </button>

            <button class="tab" type="button">
              <svg width="21" height="21"><use href="#i-list"/></svg>
              Playlist URL
            </button>
          </div>

          <div class="search-row">
            <label class="input-wrap">
              <svg width="24" height="24"><use href="#i-search"/></svg>
              <input
                id="mainInput"
                type="text"
                placeholder="Search for videos, channels, or anything..."
                aria-label="Search"
              />
            </label>

            <button class="primary-btn" id="primaryBtn" type="button">Search</button>
          </div>

          <div class="divider">or</div>

          <button class="download-btn" type="button">
            <svg width="23" height="23"><use href="#i-download"/></svg>
            Download Video / Playlist
          </button>
        </section>
      </section>
    </main>
  </div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <symbol id="logo-symbol" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="logoGrad" x1="20" y1="14" x2="98" y2="103">
            <stop offset="0%" stop-color="#ff6a3d"/>
            <stop offset="34%" stop-color="#f02cc7"/>
            <stop offset="68%" stop-color="#704bff"/>
            <stop offset="100%" stop-color="#00d6c9"/>
          </linearGradient>
          <linearGradient id="playGrad" x1="34" y1="28" x2="92" y2="88">
            <stop offset="0%" stop-color="#ff7a45"/>
            <stop offset="50%" stop-color="#b63cff"/>
            <stop offset="100%" stop-color="#306dff"/>
          </linearGradient>
        </defs>

        <path
          d="M60 13 96 34v52L60 107 24 86V34Z"
          fill="rgba(255,255,255,.04)"
          stroke="url(#logoGrad)"
          stroke-width="4"
          stroke-linejoin="round"
        />
        <circle cx="60" cy="13" r="8" fill="#f02cc7"/>
        <circle cx="96" cy="34" r="8" fill="#ff9b21"/>
        <circle cx="96" cy="86" r="8" fill="#00d6c9"/>
        <circle cx="60" cy="107" r="8" fill="#5d63ff"/>
        <circle cx="24" cy="86" r="8" fill="#cb2f88"/>
        <circle cx="24" cy="34" r="8" fill="#ff6048"/>

        <rect x="37" y="34" width="46" height="52" rx="17" fill="url(#playGrad)"/>
        <path d="M55 49v22l20-11Z" fill="white"/>
      </symbol>

      <symbol id="i-search" viewBox="0 0 24 24">

  <script>
    const app = document.getElementById("app");
    const collapseBtn = document.getElementById("collapseBtn");
    const input = document.getElementById("mainInput");
    const primaryBtn = document.getElementById("primaryBtn");

    collapseBtn?.addEventListener("click", () => {
      app.classList.toggle("sidebar-open");
      collapseBtn.textContent = app.classList.contains("sidebar-open") ? "«" : "»";
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");

        const label = tab.textContent.trim();

        if (label.includes("Video URL")) {
          input.placeholder = "Paste a video URL...";
          input.setAttribute("aria-label", "Video URL");
          primaryBtn.textContent = "Inspect";
        } else if (label.includes("Playlist URL")) {
          input.placeholder = "Paste a playlist URL...";
          input.setAttribute("aria-label", "Playlist URL");
          primaryBtn.textContent = "Inspect";
        } else {
          input.placeholder = "Search for videos, channels, or anything...";
          input.setAttribute("aria-label", "Search");
          primaryBtn.textContent = "Search";
        }
      });
    });
  </script>
